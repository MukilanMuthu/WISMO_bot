services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wismo
      POSTGRES_PASSWORD: wismo
      POSTGRES_DB: wismo
    ports:
      - "5430:5432"
    volumes:
      - wismo_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wismo -d wismo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  wismo_postgres:
